<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SOLARMAN – Get a Free Solar Quote</title>
    <meta name="description" content="Calculate your solar system cost instantly using our professional solar design tools." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: #f5f7fa;
            color: #333;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #eaeef3;
            padding-bottom: 15px;
        }
        .header h1 {
            color: #0057B8;
            font-weight: 700;
            font-size: 1.8rem;
        }
        .header h1 span { color: #F7931E; }
        .header .tag {
            font-size: 0.9rem;
            color: #666;
        }
        .upload-area {
            background: #f8f9fc;
            border: 2px dashed #cbd5e1;
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            margin-bottom: 25px;
        }
        .upload-area input[type="file"] { display: none; }
        .upload-area label {
            background: #0057B8;
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            display: inline-block;
        }
        .upload-area label:hover { background: #F7931E; }
        .upload-area .status { margin-top: 10px; font-size: 0.9rem; color: #28a745; }
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            background: #fefcf5;
            padding: 20px;
            border-radius: 16px;
        }
        .controls label {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 700;
            color: #5a6e7a;
            display: block;
            margin-bottom: 4px;
        }
        .controls select, .controls input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ced4da;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.95rem;
        }
        .controls select:focus { border-color: #F7931E; outline: none; }
        .btn-generate {
            background: #F7931E;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }
        .btn-generate:hover { background: #0057B8; transform: translateY(-2px); }
        .results {
            margin-top: 25px;
            overflow-x: auto;
        }
        .results table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }
        .results th {
            background: #1e2a3a;
            color: white;
            padding: 12px 15px;
            text-align: left;
        }
        .results td {
            padding: 10px 15px;
            border-bottom: 1px solid #e9ecef;
        }
        .results tfoot td {
            font-weight: 700;
            background: #f8f9fa;
            border-top: 2px solid #dee2e6;
        }
        .total-display {
            font-size: 1.3rem;
            font-weight: 700;
            color: #0057B8;
            text-align: right;
            margin: 15px 0;
        }
        .actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .actions .btn {
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-whatsapp { background: #25D366; color: white; }
        .btn-whatsapp:hover { background: #1da851; transform: translateY(-2px); }
        .btn-print { background: #6c757d; color: white; }
        .btn-print:hover { background: #5a6268; transform: translateY(-2px); }
        .btn-reset { background: #e9ecef; color: #333; }
        .btn-reset:hover { background: #dee2e6; }

        .hidden { display: none; }
        @media (max-width: 768px) {
            .container { padding: 20px; }
            .header { flex-direction: column; align-items: flex-start; gap: 8px; }
            .controls { grid-template-columns: 1fr; }
        }
        @media print {
            .upload-area, .actions, .btn-generate, .controls .btn-generate { display: none !important; }
            .container { box-shadow: none; border: none; padding: 20px; }
            .header { border-bottom: 2px solid #000; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>SOLARMAN <span>Quote</span></h1>
        <span class="tag"><i class="fas fa-solar-panel"></i> Professional Solar Estimate</span>
    </div>

    <!-- Inventory Upload Section -->
    <div class="upload-area" id="uploadArea">
        <p><i class="fas fa-file-excel" style="font-size: 2rem; color: #217346;"></i></p>
        <p style="margin: 10px 0; color: #555;">Load your latest inventory to get an accurate quote.</p>
        <label for="inventoryFile"><i class="fas fa-upload"></i> Upload Inventory (Excel)</label>
        <input type="file" id="inventoryFile" accept=".xlsx,.xls" />
        <div class="status" id="uploadStatus">No file loaded yet.</div>
        <div style="margin-top: 12px; font-size: 0.85rem; color: #888;">
            <i class="fas fa-info-circle"></i> If you have a fixed inventory file, we can also load it automatically.
        </div>
    </div>

    <!-- System Configuration -->
    <div class="controls" id="configControls">
        <div>
            <label>System Type</label>
            <select id="sysType">
                <option value="Hybrid">🔋 Hybrid</option>
                <option value="Daytime">☀️ Daytime</option>
            </select>
        </div>
        <div>
            <label>Size</label>
            <select id="sysSize"></select>
        </div>
        <div>
            <label>Tier</label>
            <select id="sysTier">
                <option value="affordable">💰 Affordable</option>
                <option value="normal" selected>⭐ Normal</option>
                <option value="premium">✨ Premium</option>
            </select>
        </div>
        <div>
            <label>Structure</label>
            <select id="sysStructure"><option value="">Select</option></select>
        </div>
        <div id="batteryDiv">
            <label>Battery Voltage</label>
            <select id="batteryVoltage">
                <option value="24V">24V (2-5 kW)</option>
                <option value="48V">48-51V (6+ kW)</option>
            </select>
        </div>
        <div>
            <label>&nbsp;</label>
            <button class="btn-generate" onclick="generateQuote()"><i class="fas fa-calculator"></i> Get Quote</button>
        </div>
    </div>

    <!-- Results -->
    <div id="resultsArea" class="hidden">
        <div class="total-display">Estimated Total: <span id="quoteTotal">0</span> PKR</div>
        <div class="results">
            <table>
                <thead>
                    <tr><th>Category</th><th>Item</th><th>Rate (PKR)</th><th>Qty</th><th>Total (PKR)</th></tr>
                </thead>
                <tbody id="quoteBody"></tbody>
                <tfoot>
                    <tr><td colspan="4" style="text-align:right;">Grand Total</td><td id="quoteGrandTotal">0</td></tr>
                </tfoot>
            </table>
        </div>
        <div class="actions">
            <button class="btn btn-whatsapp" onclick="shareWhatsApp()"><i class="fab fa-whatsapp"></i> Share via WhatsApp</button>
            <button class="btn btn-print" onclick="window.print()"><i class="fas fa-print"></i> Print Quote</button>
            <button class="btn btn-reset" onclick="resetQuote()"><i class="fas fa-undo"></i> New Quote</button>
        </div>
    </div>
</div>

<script>
    // ========== GLOBAL STATE ==========
    let inventory = [];
    let quoteItems = [];

    // ========== INVENTORY LOADING ==========
    document.getElementById('inventoryFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            try {
                const data = new Uint8Array(ev.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets['Inventory'];
                if (!sheet) throw new Error('Sheet "Inventory" not found.');
                const json = XLSX.utils.sheet_to_json(sheet);
                inventory = json.map(row => ({
                    category: (row.Category || row.category || '').toString().trim(),
                    name: (row.Name || row.name || '').toString().trim(),
                    purchase: parseFloat(row.Purchase || row.purchase || 0),
                    sale: parseFloat(row.Sale || row.sale || 0),
                    qty: parseInt(row.Qty || row.qty || 0),
                    watt: parseFloat(row.Watt || row.watt || 0),
                    technology: (row.Technology || row.technology || '').toString().toLowerCase()
                }));
                document.getElementById('uploadStatus').innerHTML = `<i class="fas fa-check-circle" style="color:#28a745;"></i> Loaded ${inventory.length} items from ${file.name}`;
                populateDropdowns();
                // Enable controls
                document.querySelectorAll('#configControls select, #configControls button').forEach(el => el.disabled = false);
            } catch(err) {
                alert('Error reading file: ' + err.message);
            }
        };
        reader.readAsArrayBuffer(file);
    });

    // ========== POPULATE DROPDOWNS ==========
    function populateDropdowns() {
        // Size dropdown
        updateSizeOptions();
        // Structure dropdown
        const structSel = document.getElementById('sysStructure');
        structSel.innerHTML = '<option value="">Select</option>';
        inventory.filter(i => i.category.toLowerCase().includes('structure')).forEach(item => {
            const opt = document.createElement('option');
            opt.value = item.name;
            opt.textContent = `${item.name} (${item.sale} PKR)`;
            structSel.appendChild(opt);
        });
        // Battery visibility
        toggleBattery();
    }

    function updateSizeOptions() {
        const type = document.getElementById('sysType').value;
        const sizeSel = document.getElementById('sysSize');
        sizeSel.innerHTML = '';
        if (type === 'Daytime') {
            ['6 panels system', '8 panels system', '12 panels system'].forEach(v => {
                const o = document.createElement('option');
                o.value = v;
                o.textContent = v;
                sizeSel.appendChild(o);
            });
        } else {
            for (let i = 1; i <= 12; i++) {
                const o = document.createElement('option');
                o.value = i;
                o.textContent = `${i} kW`;
                sizeSel.appendChild(o);
            }
            sizeSel.value = '5';
        }
    }

    function toggleBattery() {
        const div = document.getElementById('batteryDiv');
        div.style.display = document.getElementById('sysType').value === 'Daytime' ? 'none' : 'block';
    }

    // Event listeners for dropdown changes
    document.getElementById('sysType').addEventListener('change', function() {
        updateSizeOptions();
        toggleBattery();
    });

    // ========== QUOTE GENERATION ==========
    function pickByTier(items, tier) {
        if (!items.length) return null;
        const sorted = [...items].sort((a, b) => a.sale - b.sale);
        if (tier === 'affordable') return sorted[0];
        if (tier === 'premium') return sorted[sorted.length - 1];
        return sorted[Math.floor(sorted.length / 2)];
    }

    function addQuoteItem(cat, item, qty) {
        quoteItems.push({ category: cat, item: item.name, rate: item.sale, qty, total: item.sale * qty });
    }

    function generateQuote() {
        if (!inventory.length) {
            alert('Please upload your inventory Excel file first.');
            return;
        }

        quoteItems = [];
        const sysType = document.getElementById('sysType').value;
        const sizeVal = document.getElementById('sysSize').value;
        const tier = document.getElementById('sysTier').value;
        const structureName = document.getElementById('sysStructure').value;
        const structure = inventory.find(i => i.name === structureName);

        // Panels
        const panels = inventory.filter(i => i.category.toLowerCase().includes('panel'));
        if (!panels.length) return alert('No panels found in inventory.');
        const panel = pickByTier(panels, tier);
        const panelWatt = panel.watt || 550;
        let panelQty = 0;
        if (sysType === 'Daytime') {
            if (sizeVal.includes('6')) panelQty = 6;
            else if (sizeVal.includes('8')) panelQty = 8;
            else panelQty = 12;
        } else {
            const kw = parseFloat(sizeVal);
            panelQty = Math.ceil((kw * 1000) / panelWatt);
        }
        addQuoteItem(panel.category, panel, panelQty);

        // Inverter
        let inverters = inventory.filter(i => i.category.toLowerCase().includes('inverter'));
        if (sysType === 'Daytime') inverters = inverters.filter(i => i.name.toLowerCase().includes('daytime'));
        if (!inverters.length) return alert('No suitable inverter found.');
        const inverter = pickByTier(inverters, tier);
        addQuoteItem(inverter.category, inverter, 1);

        // Distribution box
        const distBoxes = inventory.filter(i => i.category.toLowerCase().includes('distribution'));
        if (distBoxes.length) {
            const box = pickByTier(distBoxes, tier);
            addQuoteItem(box.category, box, 1);
        }

        // Structure
        if (structure) {
            const structQty = Math.ceil(panelQty / 3);
            addQuoteItem(structure.category, structure, structQty);
        }

        // Battery (if Hybrid)
        if (sysType === 'Hybrid') {
            const voltage = document.getElementById('batteryVoltage').value;
            const targetVoltage = voltage === '24V' ? '24v' : '48v';
            let batteries = inventory.filter(i =>
                i.category.toLowerCase().includes('battery') &&
                (i.name.toLowerCase().includes(targetVoltage) || i.technology.includes(targetVoltage))
            );
            if (!batteries.length) batteries = inventory.filter(i => i.category.toLowerCase().includes('battery'));
            if (batteries.length) {
                const bat = pickByTier(batteries, tier);
                addQuoteItem(bat.category, bat, 1);
            }
        }

        // Cables (estimated 30m)
        const cables = inventory.filter(i => i.category.toLowerCase().includes('cable'));
        if (cables.length) {
            const cable = pickByTier(cables, tier);
            addQuoteItem(cable.category, cable, 30);
        }

        // Installation
        const installRate = sysType === 'Daytime' ? 1000 : 1500;
        quoteItems.push({
            category: 'Installation',
            item: `Installation (${installRate}/panel)`,
            rate: installRate,
            qty: panelQty,
            total: installRate * panelQty
        });

        renderQuote();
        document.getElementById('resultsArea').classList.remove('hidden');
    }

    function renderQuote() {
        const tbody = document.getElementById('quoteBody');
        let html = '';
        let total = 0;
        quoteItems.forEach(it => {
            total += it.total;
            html += `<tr><td>${it.category}</td><td>${it.item}</td><td>${it.rate.toLocaleString()}</td><td>${it.qty}</td><td>${it.total.toLocaleString()}</td></tr>`;
        });
        tbody.innerHTML = html;
        document.getElementById('quoteGrandTotal').innerText = total.toLocaleString();
        document.getElementById('quoteTotal').innerText = total.toLocaleString();
    }

    function resetQuote() {
        quoteItems = [];
        document.getElementById('quoteBody').innerHTML = '';
        document.getElementById('quoteGrandTotal').innerText = '0';
        document.getElementById('quoteTotal').innerText = '0';
        document.getElementById('resultsArea').classList.add('hidden');
    }

    // ========== SHARE VIA WHATSAPP ==========
    function shareWhatsApp() {
        if (!quoteItems.length) return alert('Generate a quote first.');
        const total = quoteItems.reduce((sum, it) => sum + it.total, 0);
        let msg = 'SOLARMAN Solar Quote\n\n';
        msg += 'System: ' + document.getElementById('sysType').value + '\n';
        msg += 'Size: ' + document.getElementById('sysSize').value + '\n';
        msg += 'Tier: ' + document.getElementById('sysTier').value + '\n\n';
        msg += 'Items:\n';
        quoteItems.forEach(it => {
            msg += `${it.item} x ${it.qty} = ${it.total.toLocaleString()} PKR\n`;
        });
        msg += `\nTotal: ${total.toLocaleString()} PKR`;
        // Encode for URL
        const url = `https://wa.me/?text=${encodeURIComponent(msg)}`;
        window.open(url, '_blank');
    }

    // ========== INIT ==========
    // Disable controls initially (no inventory)
    document.querySelectorAll('#configControls select, #configControls button').forEach(el => el.disabled = true);

    // Optionally, auto-load inventory from a fixed URL if you host the file in the same repo
    // Uncomment below and replace with your actual file URL
    /*
    async function loadInventoryFromURL() {
        try {
            const response = await fetch('inventory.xlsx');
            const buffer = await response.arrayBuffer();
            const workbook = XLSX.read(buffer, { type: 'array' });
            const sheet = workbook.Sheets['Inventory'];
            if (sheet) {
                const json = XLSX.utils.sheet_to_json(sheet);
                inventory = json.map(row => ({
                    category: (row.Category || row.category || '').toString().trim(),
                    name: (row.Name || row.name || '').toString().trim(),
                    purchase: parseFloat(row.Purchase || row.purchase || 0),
                    sale: parseFloat(row.Sale || row.sale || 0),
                    qty: parseInt(row.Qty || row.qty || 0),
                    watt: parseFloat(row.Watt || row.watt || 0),
                    technology: (row.Technology || row.technology || '').toString().toLowerCase()
                }));
                document.getElementById('uploadStatus').innerHTML = `<i class="fas fa-check-circle" style="color:#28a745;"></i> Loaded ${inventory.length} items from server.`;
                populateDropdowns();
                document.querySelectorAll('#configControls select, #configControls button').forEach(el => el.disabled = false);
            }
        } catch(e) {
            console.log('Auto-load inventory failed. User can upload manually.');
        }
    }
    loadInventoryFromURL();
    */
</script>
</body>
</html>
